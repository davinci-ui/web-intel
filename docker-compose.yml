# Web-Intel Local Stack
# Ship-independent — runs on every machine
# Usage: docker compose up -d

services:
  searxng:
    image: searxng/searxng:latest
    container_name: web-intel-searxng
    restart: unless-stopped
    ports:
      - "8890:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8890/

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: web-intel-flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
      - TZ=Asia/Tokyo
